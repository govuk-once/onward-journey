  <circle cx="35" cy="35" r="16.5" fill="#11E0F1" opacity="0.85" style="mix-blend-mode:multiply">
    <animate
      attributeName="cy"
      values="50;20;50"
      dur="4s"
      repeatCount="indefinite" />
  </circle>

</svg>