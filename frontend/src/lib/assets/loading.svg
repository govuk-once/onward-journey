<svg width="70" height="70" viewBox="0 0 70 70" xmlns="http://www.w3.org/2000/svg">

  <circle cx="35" cy="35" r="16.5" fill="#BA4AFF" opacity="0.85" style="mix-blend-mode:multiply">
    <animate
      attributeName="cy"
      values="20;50;20"
      dur="4s"
      repeatCount="indefinite" />
